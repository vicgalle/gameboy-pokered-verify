# Inner loop configuration — the researcher can modify these values.

# Model for the formalizer LLM.
# Claude models: claude-sonnet-4-6, claude-opus-4-6
# Gemini models: gemini-2.5-pro-preview, gemini-2.5-flash-preview
model: claude-sonnet-4-6

# Number of iterations per bug (prompt -> code -> compile -> feedback).
iterations_per_bug: 5

# Lean build timeout in seconds.
build_timeout: 300
